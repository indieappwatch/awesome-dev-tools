<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Page Not Found</title>
  <style>
    :root {
      --bg: #f8f7f4;
      --text: #1a1a1a;
      --text-muted: #6b7280;
      --accent: #d44a0e;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }
    .container { text-align: center; max-width: 480px; }
    .code { font-size: 6rem; font-weight: 800; color: var(--accent); line-height: 1; }
    h1 { font-size: 1.5rem; margin: 1rem 0 0.5rem; }
    p { color: var(--text-muted); line-height: 1.6; margin-bottom: 2rem; }
    a { color: var(--accent); text-decoration: none; font-weight: 500; }
    a:hover { text-decoration: underline; }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
  <div class="container">
    <div class="code">404</div>
    <h1>Page not found</h1>
    <p>The page you're looking for doesn't exist or has been moved. Head back to the homepage to find what you need.</p>
    <a href="https://indieappwatch.com/">Back to homepage</a>
  </div>
</body>
</html>
